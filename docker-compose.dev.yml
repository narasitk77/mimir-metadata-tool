# Local Development — hot reload + bind mount
# Usage: docker compose -f docker-compose.dev.yml up
services:
  mimir-tool:
    build:
      context: .
      dockerfile: Dockerfile
    image: mimir-metadata-tool:dev
    container_name: mimir-metadata-tool-dev
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app          # hot reload
      - ./data:/app/data        # local SQLite (created automatically)
    env_file:
      - .env
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    restart: "no"
