<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>Admin — Allowed Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background:#0d0d0d; color:#e0e0e0; font-family:system-ui,-apple-system,sans-serif }
    .card { background:#1a1a1a; border:1px solid #2a2a2a }
    .table { color:#e0e0e0 }
    .table thead th { border-bottom-color:#2a2a2a; color:#999; font-weight:500; font-size:.85em }
    .table td { border-color:#1f1f1f; vertical-align:middle }
    .badge-env { background:#2a4a6a; color:#9ec5fe }
    .badge-db  { background:#2a4a2a; color:#9ee5b0 }
  </style>
</head>
<body>
<div class="container py-4" style="max-width:900px">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="m-0"><i class="bi bi-people-fill me-2"></i>Allowed Users</h4>
    <a href="{{ root_path }}/" class="btn btn-sm btn-outline-light"><i class="bi bi-arrow-left me-1"></i>กลับหน้าหลัก</a>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <h6 class="text-secondary">เพิ่มอีเมลที่อนุญาต</h6>
      <div class="row g-2">
        <div class="col-md-7">
          <input type="email" id="email" class="form-control bg-dark text-light border-secondary" placeholder="user@thestandard.co">
        </div>
        <div class="col-md-3">
          <div class="form-check form-switch mt-2">
            <input class="form-check-input" type="checkbox" id="is-admin">
            <label class="form-check-label" for="is-admin">Admin</label>
          </div>
        </div>
        <div class="col-md-2">
          <button class="btn btn-success w-100" onclick="addUser()"><i class="bi bi-plus-lg me-1"></i>เพิ่ม</button>
        </div>
      </div>
      <div id="msg" class="small mt-2"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <h6 class="text-secondary">รายการสิทธิ์เข้าใช้</h6>
      <table class="table table-sm">
        <thead><tr><th>Email</th><th>Role</th><th>Source</th><th>Added by</th><th></th></tr></thead>
        <tbody id="tbody"><tr><td colspan="5" class="text-secondary">กำลังโหลด…</td></tr></tbody>
      </table>
      <div class="text-secondary small">
        <i class="bi bi-info-circle me-1"></i>
        <strong>env</strong> = ตั้งจาก Portainer (แก้ไม่ได้จากหน้านี้ ต้องเปลี่ยนใน stack)
        · <strong>db</strong> = เพิ่มจากหน้านี้ (ลบได้)
      </div>
    </div>
  </div>
</div>

<script>
const ROOT = '{{ root_path }}';

async function load() {
  const r = await fetch(ROOT + '/api/admin/users');
  if (!r.ok) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="5" class="text-danger">โหลดไม่ได้: ${r.status}</td></tr>`;
    return;
  }
  const d = await r.json();
  const rows = [];
  for (const u of d.env) {
    rows.push(renderRow(u, true));
  }
  for (const u of d.db) {
    rows.push(renderRow(u, false));
  }
  document.getElementById('tbody').innerHTML = rows.join('') ||
    '<tr><td colspan="5" class="text-secondary">ยังไม่มีรายการ</td></tr>';
}

function renderRow(u, isEnv) {
  const role = u.is_admin
    ? '<span class="badge bg-warning text-dark">Admin</span>'
    : '<span class="badge bg-secondary">User</span>';
  const src = isEnv
    ? '<span class="badge badge-env">env</span>'
    : '<span class="badge badge-db">db</span>';
  const del = isEnv ? '' :
    `<button class="btn btn-sm btn-outline-danger" onclick="del(${u.id}, '${u.email}')">
       <i class="bi bi-trash"></i></button>`;
  return `<tr>
    <td>${u.email}</td>
    <td>${role}</td>
    <td>${src}</td>
    <td class="text-secondary small">${u.added_by || '—'}</td>
    <td class="text-end">${del}</td>
  </tr>`;
}

async function addUser() {
  const email = document.getElementById('email').value.trim();
  const isAdmin = document.getElementById('is-admin').checked;
  const msg = document.getElementById('msg');
  if (!email) { msg.innerHTML = '<span class="text-warning">กรอก email ก่อน</span>'; return; }
  const r = await fetch(ROOT + '/api/admin/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, is_admin: isAdmin }),
  });
  if (!r.ok) {
    msg.innerHTML = `<span class="text-danger">เพิ่มไม่ได้: ${(await r.json()).detail}</span>`;
    return;
  }
  msg.innerHTML = '<span class="text-success">✓ เพิ่มแล้ว</span>';
  document.getElementById('email').value = '';
  document.getElementById('is-admin').checked = false;
  load();
}

async function del(id, email) {
  if (!confirm(`ลบสิทธิ์ของ ${email} ?`)) return;
  const r = await fetch(ROOT + '/api/admin/users/' + id, { method: 'DELETE' });
  if (!r.ok) { alert('ลบไม่ได้: ' + r.status); return; }
  load();
}

load();
</script>
</body>
</html>
