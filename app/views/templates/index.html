<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mimir Metadata AI Tool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <style>
    body { background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #1a1d27 !important; border-bottom: 1px solid #2d3148; }
    .card { background: #1a1d27; border: 1px solid #2d3148; }
    .card-stat { transition: transform .15s; }
    .card-stat:hover { transform: translateY(-2px); }
    .stat-num { font-size: 2rem; font-weight: 700; }
    .badge-pending  { background: #374151; color: #9ca3af; }
    .badge-processing { background: #1e3a5f; color: #60a5fa; }
    .badge-done     { background: #14532d; color: #4ade80; }
    .badge-error    { background: #450a0a; color: #f87171; }
    .table { --bs-table-bg: transparent; --bs-table-color: #e2e8f0; }
    .table thead th { border-color: #2d3148; color: #94a3b8; font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; }
    .table tbody td { border-color: #1e2130; vertical-align: middle; font-size: .85rem; }
    .table tbody tr:hover td { background: #1e2235; }
    .thumb { width: 60px; height: 40px; object-fit: cover; border-radius: 4px; background: #2d3148; }
    .thumb-placeholder { width: 60px; height: 40px; border-radius: 4px; background: #2d3148; display:flex; align-items:center; justify-content:center; color:#475569; }
    .btn-action { font-size: .8rem; padding: .25rem .6rem; }
    #progress-section { display: none; }
    .progress { background: #2d3148; height: 8px; }
    .log-box { background: #0d1117; border: 1px solid #2d3148; border-radius: 6px; padding: 10px; font-family: monospace; font-size: .78rem; max-height: 140px; overflow-y: auto; color: #94a3b8; }
    .filter-btn.active { background: #3b82f6 !important; color: #fff !important; border-color: #3b82f6 !important; }
    .config-badge { font-size: .7rem; background: #1e2235; border: 1px solid #2d3148; padding: 2px 8px; border-radius: 99px; color: #94a3b8; }
    .ai-preview { max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #7dd3fc; }
    .modal-content { background: #1a1d27; border: 1px solid #2d3148; color: #e2e8f0; }
    .modal-header { border-bottom: 1px solid #2d3148; }
    .modal-footer { border-top: 1px solid #2d3148; }
    textarea.form-control { background: #0f1117; border-color: #2d3148; color: #e2e8f0; }
    textarea.form-control:focus { background: #0f1117; color: #e2e8f0; border-color: #3b82f6; box-shadow: 0 0 0 .2rem rgba(59,130,246,.25); }
    .field-edit { background: #0f1117 !important; border-color: #2d3148 !important; color: #e2e8f0 !important; }
    .field-edit:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 .2rem rgba(59,130,246,.2) !important; }
    .field-edit option { background: #1a1d27; }
    #folder-url-input::placeholder { color: #475569; }
    #folder-url-input:focus { background: #0f1117; color: #e2e8f0; border-color: #3b82f6; box-shadow: 0 0 0 .2rem rgba(59,130,246,.25); }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #0f1117; } ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark px-3 py-2">
  <span class="navbar-brand fw-bold me-3">
    <i class="bi bi-stars text-primary me-1"></i> Mimir Metadata AI
  </span>
  <div class="d-flex align-items-center gap-2 ms-auto">
    <span class="config-badge"><i class="bi bi-cpu me-1"></i>{{ gemini_model }}</span>
    <a href="{{ mimir_url }}" target="_blank" class="config-badge text-decoration-none">
      <i class="bi bi-box-arrow-up-right me-1"></i>Mimir
    </a>
  </div>
</nav>

<div class="container-fluid px-4 py-4">

  <!-- Stats Row -->
  <div class="row g-3 mb-4" id="stats-row">
    <div class="col-6 col-md-2">
      <div class="card card-stat p-3 text-center">
        <div class="stat-num text-white" id="stat-total">—</div>
        <div class="text-secondary small">Total Assets</div>
      </div>
    </div>
    <div class="col-6 col-md-2">
      <div class="card card-stat p-3 text-center">
        <div class="stat-num text-secondary" id="stat-pending">—</div>
        <div class="text-secondary small">Pending</div>
      </div>
    </div>
    <div class="col-6 col-md-2">
      <div class="card card-stat p-3 text-center">
        <div class="stat-num text-success" id="stat-done">—</div>
        <div class="text-secondary small">Done</div>
      </div>
    </div>
    <div class="col-6 col-md-2">
      <div class="card card-stat p-3 text-center">
        <div class="stat-num text-danger" id="stat-error">—</div>
        <div class="text-secondary small">Errors</div>
      </div>
    </div>
    <div class="col-12 col-md-4">
      <div class="card card-stat p-3">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <div>
            <div class="text-secondary small mb-1"><i class="bi bi-coin me-1"></i>Token Cost <span class="text-muted" id="token-model" style="font-size:.7rem"></span></div>
            <div class="d-flex align-items-baseline gap-2">
              <span class="stat-num text-warning" id="stat-cost-thb" style="font-size:1.6rem">—</span>
              <span class="text-secondary small">THB</span>
              <span class="text-muted small" id="stat-cost-usd"></span>
            </div>
          </div>
          <div class="text-end text-secondary" style="font-size:.72rem;line-height:1.7">
            <div>Input: <span id="stat-tokens-in" class="text-light">—</span></div>
            <div>Output: <span id="stat-tokens-out" class="text-light">—</span></div>
            <div>Avg/รูป: <span id="stat-tokens-avg" class="text-light">—</span></div>
          </div>
        </div>
        <!-- Free Tier usage bars -->
        <div style="font-size:.7rem">
          <div class="d-flex justify-content-between text-secondary mb-1">
            <span><i class="bi bi-shield-check me-1"></i>Free Tier วันนี้</span>
            <span id="tier-reset-hint" class="text-muted"></span>
          </div>
          <div class="d-flex justify-content-between text-secondary mb-1">
            <span>Requests <span id="tier-req-count" class="text-light"></span></span>
            <span id="tier-req-pct"></span>
          </div>
          <div class="progress mb-1" style="height:4px">
            <div class="progress-bar" id="tier-req-bar" style="width:0%"></div>
          </div>
          <div class="d-flex justify-content-between text-secondary mb-1">
            <span>Tokens <span id="tier-tok-count" class="text-light"></span></span>
            <span id="tier-tok-pct"></span>
          </div>
          <div class="progress" style="height:4px">
            <div class="progress-bar" id="tier-tok-bar" style="width:0%"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Folder Input -->
  <div class="card p-3 mb-3">
    <label class="text-secondary small mb-1"><i class="bi bi-folder2-open me-1"></i>Mimir Folder URL หรือ Folder ID</label>
    <div class="d-flex gap-2">
      <input type="text" id="folder-url-input" class="form-control form-control-sm"
        placeholder="https://apac.mjoll.no/folders/xxxxxxxx-xxxx-... หรือ UUID ตรงๆ"
        style="background:#0f1117;border-color:#2d3148;color:#e2e8f0;font-family:monospace;font-size:.82rem"
        value="" />
      <span id="folder-id-badge" class="align-self-center text-secondary small text-nowrap" style="min-width:fit-content"></span>
    </div>
  </div>

  <!-- Action Bar -->
  <div class="card p-3 mb-3">
    <div class="d-flex flex-wrap gap-2 align-items-center">
      <button class="btn btn-primary btn-sm" id="btn-fetch" onclick="startFetch()">
        <i class="bi bi-cloud-download me-1"></i>Fetch from Mimir
      </button>
      <button class="btn btn-success btn-sm" id="btn-batch" onclick="startBatch()">
        <i class="bi bi-stars me-1"></i>Run Gemini Batch
      </button>
      <button class="btn btn-outline-info btn-sm" id="btn-push-all" onclick="pushAll()">
        <i class="bi bi-upload me-1"></i>Push All to Mimir
      </button>
      <div class="vr mx-1 d-none d-md-block"></div>
      <div class="btn-group btn-group-sm" role="group" id="filter-group">
        <button type="button" class="btn btn-outline-secondary filter-btn active" data-filter="all" onclick="setFilter(this)">All</button>
        <button type="button" class="btn btn-outline-secondary filter-btn" data-filter="pending" onclick="setFilter(this)">Pending</button>
        <button type="button" class="btn btn-outline-secondary filter-btn" data-filter="done" onclick="setFilter(this)">Done</button>
        <button type="button" class="btn btn-outline-secondary filter-btn" data-filter="error" onclick="setFilter(this)">Error</button>
      </div>
      <div class="ms-auto">
        <button class="btn btn-outline-danger btn-sm" onclick="clearAll()">
          <i class="bi bi-trash3 me-1"></i>Clear DB
        </button>
      </div>
    </div>
  </div>

  <!-- Progress Section -->
  <div class="card p-3 mb-3" id="progress-section">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span class="fw-semibold small" id="progress-label">Processing…</span>
      <span class="text-secondary small" id="progress-count"></span>
    </div>
    <div class="progress mb-2">
      <div class="progress-bar progress-bar-striped progress-bar-animated" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="log-box" id="log-box"></div>
  </div>

  <!-- Assets Table -->
  <div class="card">
    <div class="card-body p-0">
      <table class="table table-hover mb-0" id="assets-table">
        <thead>
          <tr>
            <th style="width:70px">Thumb</th>
            <th>Original Title</th>
            <th>AI Title</th>
            <th style="width:100px">Category</th>
            <th style="width:80px">Type</th>
            <th style="width:90px">Status</th>
            <th style="width:100px">Actions</th>
          </tr>
        </thead>
        <tbody id="assets-tbody">
          <tr><td colspan="7" class="text-center text-secondary py-5">No assets loaded yet — click "Fetch from Mimir"</td></tr>
        </tbody>
      </table>
    </div>
    <!-- Pagination -->
    <div class="card-footer d-flex justify-content-between align-items-center py-2 px-3" id="pagination-bar" style="display:none!important">
      <span class="text-secondary small" id="pagination-info"></span>
      <div class="d-flex gap-1">
        <button class="btn btn-outline-secondary btn-sm" id="btn-prev" onclick="changePage(-1)">
          <i class="bi bi-chevron-left"></i>
        </button>
        <button class="btn btn-outline-secondary btn-sm" id="btn-next" onclick="changePage(1)">
          <i class="bi bi-chevron-right"></i>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h6 class="modal-title mb-0" id="modal-item-id">Asset Detail</h6>
          <div class="text-secondary" style="font-size:.72rem" id="modal-ingest-path"></div>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <!-- Thumbnail + meta -->
        <div class="d-flex gap-3 mb-3">
          <img id="modal-thumb" src="" class="rounded flex-shrink-0" style="width:120px;height:80px;object-fit:cover" />
          <div class="text-secondary small align-self-center" id="modal-meta"></div>
        </div>

        <!-- Editable fields -->
        <div class="mb-3">
          <label class="form-label text-secondary small mb-1">AI Title</label>
          <input type="text" class="form-control form-control-sm field-edit" id="edit-ai-title" placeholder="ชื่อภาษาไทย รูปแบบ YYYY.MM.DD_หัวข้อ_ชื่อ" />
        </div>

        <div class="mb-3">
          <label class="form-label text-secondary small mb-1">Description</label>
          <textarea class="form-control form-control-sm field-edit" id="edit-ai-desc" rows="4" placeholder="อธิบาย 3-5 ประโยค ว่าใคร ทำอะไร ที่ไหน"></textarea>
        </div>

        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label text-secondary small mb-1">Category</label>
            <select class="form-select form-select-sm field-edit" id="edit-ai-cat">
              <option value="">— เลือก —</option>
              <option>Photo</option>
              <option>Footage</option>
              <option>Audio</option>
              <option>Graphic</option>
              <option>Deliverable</option>
            </select>
          </div>
          <div class="col-6">
            <label class="form-label text-secondary small mb-1">Sub-category</label>
            <select class="form-select form-select-sm field-edit" id="edit-ai-subcat">
              <option value="">— เลือก —</option>
              <option>Portrait</option>
              <option>Event</option>
              <option>B-Roll</option>
              <option>Drone</option>
              <option>BTS</option>
              <option>Interview</option>
              <option>Press Conference</option>
              <option>Protest</option>
              <option>Document</option>
              <option>Product</option>
            </select>
          </div>
        </div>

        <div class="mb-2">
          <label class="form-label text-secondary small mb-1">Keywords <span class="text-muted">(คั่นด้วย comma)</span></label>
          <input type="text" class="form-control form-control-sm field-edit" id="edit-ai-keyword" placeholder="คำ1, คำ2, คำ3, คำ4, คำ5" />
          <div class="mt-1" id="keyword-preview"></div>
        </div>
      </div>

      <div class="modal-footer justify-content-between">
        <div class="d-flex gap-2">
          <button class="btn btn-outline-warning btn-sm" onclick="resetFromModal()">
            <i class="bi bi-arrow-counterclockwise me-1"></i>Reset to Pending
          </button>
          <button class="btn btn-outline-info btn-sm" onclick="pushFromModal()">
            <i class="bi bi-upload me-1"></i>Push to Mimir
          </button>
        </div>
        <div class="d-flex gap-2">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">ยกเลิก</button>
          <button class="btn btn-primary btn-sm" onclick="saveFromModal()">
            <i class="bi bi-floppy me-1"></i>บันทึก
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // ── State ──────────────────────────────────────────────────────────────
  let currentFilter = 'all';
  let currentPage = 1;
  let totalPages = 1;
  let perPage = 50;
  let modalItemId = null;
  let refreshInterval = null;

  // ── Init ───────────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    loadStats();
    loadTokenStats();
    loadAssets();
    startAutoRefresh();
    document.getElementById('edit-ai-keyword').addEventListener('input', e => renderKeywordPreview(e.target.value));
  });

  function startAutoRefresh() {
    refreshInterval = setInterval(() => { loadStats(); loadTokenStats(); }, 5000);
  }

  // ── Stats ──────────────────────────────────────────────────────────────
  async function loadStats() {
    const r = await fetch('/api/stats');
    const d = await r.json();
    document.getElementById('stat-total').textContent = d.total;
    document.getElementById('stat-pending').textContent = d.pending + (d.processing ? ` (+${d.processing})` : '');
    document.getElementById('stat-done').textContent = d.done;
    document.getElementById('stat-error').textContent = d.error;
  }

  async function loadTokenStats() {
    const r = await fetch('/api/token-stats');
    const d = await r.json();

    document.getElementById('token-model').textContent = d.model;
    document.getElementById('stat-cost-thb').textContent = d.analyzed ? d.cost_total_thb.toFixed(4) : '0.0000';
    document.getElementById('stat-cost-usd').textContent = d.analyzed ? `$${d.cost_total_usd.toFixed(5)}` : '';
    document.getElementById('stat-tokens-in').textContent  = d.total_input.toLocaleString();
    document.getElementById('stat-tokens-out').textContent = d.total_output.toLocaleString();
    document.getElementById('stat-tokens-avg').textContent = d.analyzed
      ? `${(d.avg_input + d.avg_output).toLocaleString()} tok` : '—';

    // Free Tier bars
    const reqColor = d.rpd_pct >= d.warn_pct ? '#f87171' : d.rpd_pct >= 70 ? '#fbbf24' : '#4ade80';
    const tokColor = d.tpd_pct >= d.warn_pct ? '#f87171' : d.tpd_pct >= 70 ? '#fbbf24' : '#4ade80';
    document.getElementById('tier-req-count').textContent = `${d.today_requests}/${d.rpd_limit}`;
    document.getElementById('tier-req-pct').textContent   = `${d.rpd_pct}%`;
    document.getElementById('tier-req-bar').style.cssText = `width:${Math.min(d.rpd_pct,100)}%;background:${reqColor}`;
    document.getElementById('tier-tok-count').textContent = `${d.today_tokens.toLocaleString()}/${(d.tpd_limit/1000).toFixed(0)}K`;
    document.getElementById('tier-tok-pct').textContent   = `${d.tpd_pct}%`;
    document.getElementById('tier-tok-bar').style.cssText = `width:${Math.min(d.tpd_pct,100)}%;background:${tokColor}`;

    // แสดงเวลา reset
    const now = new Date();
    const resetUTC = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()+1));
    const diffH = Math.floor((resetUTC - now) / 3600000);
    const diffM = Math.floor(((resetUTC - now) % 3600000) / 60000);
    document.getElementById('tier-reset-hint').textContent = `reset ใน ${diffH}ชม. ${diffM}น.`;
  }

  // ── Assets Table ───────────────────────────────────────────────────────
  async function loadAssets() {
    const r = await fetch(`/api/assets?status=${currentFilter}&page=${currentPage}&per_page=${perPage}`);
    const d = await r.json();
    totalPages = Math.ceil(d.total / perPage) || 1;
    renderTable(d.items);
    renderPagination(d.total);
  }

  function renderTable(items) {
    const tbody = document.getElementById('assets-tbody');
    if (!items.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="text-center text-secondary py-5">No assets found</td></tr>`;
      return;
    }
    tbody.innerHTML = items.map(a => `
      <tr>
        <td>${a.thumbnail_url
          ? `<img src="${a.thumbnail_url}" class="thumb" onerror="this.style.display='none'" />`
          : `<div class="thumb-placeholder"><i class="bi bi-image"></i></div>`}</td>
        <td class="text-truncate" style="max-width:180px" title="${esc(a.title)}">${esc(a.title) || '<span class="text-muted">—</span>'}</td>
        <td><div class="ai-preview" title="${esc(a.ai_title)}">${esc(a.ai_title) || '<span class="text-muted">—</span>'}</div></td>
        <td><span class="text-muted small">${esc(a.ai_category) || '—'}</span> <span class="text-secondary" style="font-size:.75rem">${esc(a.ai_subcat) || ''}</span></td>
        <td><span class="text-muted small">${esc(a.item_type) || '—'}</span></td>
        <td><span class="badge ${badgeClass(a.status)}">${a.status}</span></td>
        <td>
          <button class="btn btn-outline-secondary btn-action" onclick="openDetail('${a.item_id}')"><i class="bi bi-eye"></i></button>
          ${a.status === 'error' ? `<button class="btn btn-outline-warning btn-action ms-1" onclick="resetAsset('${a.item_id}')"><i class="bi bi-arrow-counterclockwise"></i></button>` : ''}
        </td>
      </tr>`).join('');
  }

  function renderPagination(total) {
    const bar = document.getElementById('pagination-bar');
    if (total > perPage) {
      bar.style.removeProperty('display');
      document.getElementById('pagination-info').textContent = `Page ${currentPage} / ${totalPages}  (${total} items)`;
      document.getElementById('btn-prev').disabled = currentPage <= 1;
      document.getElementById('btn-next').disabled = currentPage >= totalPages;
    } else {
      bar.style.display = 'none';
    }
  }

  function setFilter(btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    currentPage = 1;
    loadAssets();
  }

  function changePage(delta) {
    currentPage = Math.max(1, Math.min(totalPages, currentPage + delta));
    loadAssets();
  }

  // ── Detail Modal ───────────────────────────────────────────────────────
  async function openDetail(itemId) {
    modalItemId = itemId;
    const r = await fetch(`/api/assets/${itemId}`);
    const a = await r.json();

    document.getElementById('modal-item-id').textContent = a.title || itemId;
    document.getElementById('modal-ingest-path').textContent = a.ingest_path || '';
    document.getElementById('modal-thumb').src = a.thumbnail_url || '';
    document.getElementById('modal-thumb').style.display = a.thumbnail_url ? '' : 'none';
    document.getElementById('modal-meta').innerHTML =
      [a.item_type, a.file_type,
       a.width && a.height ? `${a.width}×${a.height}` : '',
       a.filesize_mb ? `${a.filesize_mb} MB` : '',
       `<span class="badge ${badgeClass(a.status)} ms-1">${a.status}</span>`
      ].filter(Boolean).join(' · ');

    document.getElementById('edit-ai-title').value   = a.ai_title || '';
    document.getElementById('edit-ai-desc').value    = a.ai_description || '';
    document.getElementById('edit-ai-cat').value     = a.ai_category || '';
    document.getElementById('edit-ai-subcat').value  = a.ai_subcat || '';
    document.getElementById('edit-ai-keyword').value = a.ai_keyword || '';
    renderKeywordPreview(a.ai_keyword || '');

    new bootstrap.Modal(document.getElementById('detailModal')).show();
  }

  function renderKeywordPreview(raw) {
    document.getElementById('keyword-preview').innerHTML =
      raw.split(',').filter(k => k.trim()).map(k =>
        `<span class="badge bg-secondary me-1 mb-1">${esc(k.trim())}</span>`).join('');
  }

  async function saveFromModal() {
    if (!modalItemId) return;
    const payload = {
      ai_title:       document.getElementById('edit-ai-title').value,
      ai_description: document.getElementById('edit-ai-desc').value,
      ai_category:    document.getElementById('edit-ai-cat').value,
      ai_subcat:      document.getElementById('edit-ai-subcat').value,
      ai_keyword:     document.getElementById('edit-ai-keyword').value,
    };
    const r = await fetch(`/api/assets/${modalItemId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (r.ok) {
      bootstrap.Modal.getInstance(document.getElementById('detailModal'))?.hide();
      loadAssets();
    } else {
      alert('บันทึกไม่สำเร็จ: ' + (await r.json()).detail);
    }
  }

  async function resetFromModal() {
    if (!modalItemId) return;
    await resetAsset(modalItemId);
    bootstrap.Modal.getInstance(document.getElementById('detailModal'))?.hide();
  }

  async function pushFromModal() {
    if (!modalItemId) return;
    const r = await fetch(`/api/assets/${modalItemId}/push`, { method: 'POST' });
    const d = await r.json();
    alert(d.ok ? 'Push สำเร็จแล้ว' : `Error: ${d.detail}`);
  }

  // ── Actions ────────────────────────────────────────────────────────────
  async function startFetch() {
    const folderUrl = document.getElementById('folder-url-input').value.trim();
    if (!folderUrl) { alert('กรุณาระบุ Folder URL หรือ Folder ID ก่อน'); return; }

    const btn = document.getElementById('btn-fetch');
    btn.disabled = true;

    const r = await fetch('/api/fetch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ folder_url: folderUrl }),
    });
    if (!r.ok) { alert((await r.json()).detail); btn.disabled = false; return; }

    const { folder_id } = await r.json();
    document.getElementById('folder-id-badge').textContent = `ID: ${folder_id}`;
    showProgress('Fetching from Mimir…');
    const es = new EventSource('/api/fetch/stream');
    es.onmessage = e => {
      const d = JSON.parse(e.data);
      if (d.type === 'progress') {
        setProgress(d.fetched, d.total, `Fetched ${d.fetched} / ${d.total}`);
        appendLog(`Fetched ${d.fetched} / ${d.total}`);
      } else if (d.type === 'done') {
        setProgress(d.total, d.total, `Done — ${d.fetched} items fetched`);
        appendLog(`✓ Fetch complete: ${d.fetched} items`);
        es.close(); btn.disabled = false;
        loadStats(); loadAssets();
      } else if (d.type === 'error') {
        appendLog(`✗ Error: ${d.message}`);
        es.close(); btn.disabled = false;
      }
    };
    es.onerror = () => { appendLog('✗ Stream error'); es.close(); btn.disabled = false; };
  }

  async function startBatch() {
    const btn = document.getElementById('btn-batch');
    btn.disabled = true;
    const r = await fetch('/api/batch', { method: 'POST' });
    if (!r.ok) { alert((await r.json()).detail); btn.disabled = false; return; }

    showProgress('Running Gemini Batch…');
    const es = new EventSource('/api/batch/stream');
    es.onmessage = e => {
      const d = JSON.parse(e.data);
      if (d.type === 'progress') {
        setProgress(d.processed + d.errors, d.total,
          `Processing ${d.processed + d.errors} / ${d.total} — ${d.errors} errors` + (d.current ? ` — ${d.current}` : ''));
        appendLog(`[${d.processed}/${d.total}] ${d.current || ''}`);
      } else if (d.type === 'done') {
        setProgress(d.total, d.total, `Done — ${d.processed} processed, ${d.errors} errors`);
        appendLog(`✓ Batch complete: ${d.processed} done, ${d.errors} errors`);
        es.close(); btn.disabled = false;
        loadStats(); loadAssets(); loadTokenStats();
      } else if (d.type === 'rate_limit') {
        setProgress(d.processed + d.errors, d.total, `⚠️ หยุดชั่วคราว — ${d.message}`);
        appendLog(`⚠️ Rate limit: ${d.message}`);
        es.close(); btn.disabled = false;
        loadTokenStats();
      } else if (d.type === 'error') {
        appendLog(`✗ Error: ${d.message}`);
        es.close(); btn.disabled = false;
      }
    };
    es.onerror = () => { appendLog('✗ Stream error'); es.close(); btn.disabled = false; };
  }

  async function pushAll() {
    if (!confirm('Push all "done" assets to Mimir?')) return;
    const btn = document.getElementById('btn-push-all');
    btn.disabled = true;
    showProgress('Pushing to Mimir…');
    const es = new EventSource('/api/push-all');
    es.onmessage = e => {
      const d = JSON.parse(e.data);
      if (d.type === 'done') {
        appendLog(`✓ Push complete: ${d.ok_total} ok, ${d.errors} errors`);
        es.close(); btn.disabled = false; loadStats();
      } else {
        setProgress(d.ok_total + d.errors, d.total, `Pushed ${d.ok_total + d.errors} / ${d.total}`);
        appendLog(`${d.ok ? '✓' : '✗'} ${d.item_id}`);
      }
    };
    es.onerror = () => { appendLog('✗ Stream error'); es.close(); btn.disabled = false; };
  }

  async function resetAsset(itemId) {
    await fetch(`/api/assets/${itemId}/reset`, { method: 'PATCH' });
    loadAssets(); loadStats();
  }

  async function clearAll() {
    if (!confirm('Delete all assets from the local DB?')) return;
    const r = await fetch('/api/assets', { method: 'DELETE' });
    const d = await r.json();
    if (d.deleted !== undefined) { loadStats(); loadAssets(); hideProgress(); }
    else alert(d.detail);
  }

  // ── Progress helpers ───────────────────────────────────────────────────
  function showProgress(label) {
    document.getElementById('progress-section').style.display = '';
    document.getElementById('progress-label').textContent = label;
    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('progress-count').textContent = '';
    document.getElementById('log-box').textContent = '';
  }

  function hideProgress() {
    document.getElementById('progress-section').style.display = 'none';
  }

  function setProgress(current, total, label) {
    const pct = total ? Math.round(current / total * 100) : 0;
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-label').textContent = label;
    document.getElementById('progress-count').textContent = `${pct}%`;
    loadStats();
    loadAssets();
  }

  function appendLog(msg) {
    const box = document.getElementById('log-box');
    box.textContent += msg + '\n';
    box.scrollTop = box.scrollHeight;
  }

  // ── Helpers ────────────────────────────────────────────────────────────
  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function badgeClass(status) {
    return { pending: 'badge-pending', processing: 'badge-processing', done: 'badge-done', error: 'badge-error' }[status] || 'bg-secondary';
  }
</script>
</body>
</html>
