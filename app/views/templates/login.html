<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>เข้าสู่ระบบ — Mimir Metadata AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111; color: #f0f0f0;
      font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
      padding: 48px 40px; width: 100%; max-width: 400px; text-align: center;
    }
    .logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .logo .spark { color: #f5c518; }
    .sub { color: #888; font-size: .85rem; margin-bottom: 32px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #444;
      background: #fff; color: #222; font-size: .95rem; font-weight: 600;
      text-decoration: none; cursor: pointer; transition: background .15s;
    }
    .btn:hover { background: #e8e8e8; }
    .gicon { width: 18px; height: 18px; }
    .domain { margin-top: 24px; color: #666; font-size: .8rem; }
    .domain code { background: #2a2a2a; padding: 2px 6px; border-radius: 4px; color: #aaa; }
    .err {
      background: #3a1a1a; border: 1px solid #6b2b2b; color: #f5a5a5;
      border-radius: 8px; padding: 10px 14px; font-size: .85rem; margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="spark">✦</span> Mimir Metadata AI</div>
    <div class="sub">เครื่องมือเติม metadata อัตโนมัติ</div>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <a class="btn" href="{{ root_path }}/auth/start">
      <svg class="gicon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      เข้าสู่ระบบด้วย Google
    </a>

    <div class="domain">เฉพาะบัญชี <code>@thestandard.co</code> เท่านั้น</div>
  </div>
</body>
</html>
