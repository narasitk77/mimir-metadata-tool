# Production / Portainer Stack (Web Editor)
# Pulls the pre-built image from GHCR. Postgres for persistent storage.
# Caddy terminates HTTPS with a real Let's Encrypt cert for the public
# subdomain — required for Google SSO callbacks.
#
# IT prerequisites for this stack:
#   1. DNS A record:  mimir-tool.thestandard.co  →  <office public IP>
#   2. FortiGate port-forward:  external 80 + 443  →  192.168.21.220  (Caddy)
# Without 80/443 reachable from the internet Let's Encrypt's HTTP-01
# challenge fails and Caddy can't issue the cert.
services:
  postgres:
    image: postgres:16-alpine
    container_name: mimir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mimir_metadata}
      POSTGRES_USER: ${POSTGRES_USER:-mimir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mimir_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mimir} -d ${POSTGRES_DB:-mimir_metadata}"]
      interval: 10s
      timeout: 5s
      retries: 5
  mimir-tool:
    image: ghcr.io/narasitk77/mimir-metadata-tool:latest
    pull_policy: always
    container_name: mimir-metadata-tool
    # No entrypoint/command override — the image's Dockerfile CMD already runs
    # uvicorn with --proxy-headers (needed so X-Forwarded-Proto from Caddy is
    # trusted). The `pip install itsdangerous` hotfix is no longer needed:
    # itsdangerous is in requirements.txt as of 0b8977e and baked into the image.
    expose:
      - "8000"
    volumes:
      - mimir_data:/app/data
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mimir}:${POSTGRES_PASSWORD:-mimir_secret}@postgres:5432/${POSTGRES_DB:-mimir_metadata}
      # Mimir DAM
      MIMIR_BASE_URL: ${MIMIR_BASE_URL:-https://apac.mjoll.no}
      MIMIR_TOKEN: ${MIMIR_TOKEN:-}
      MIMIR_COGNITO_USER_POOL_ID: ${MIMIR_COGNITO_USER_POOL_ID:-}
      MIMIR_COGNITO_CLIENT_ID: ${MIMIR_COGNITO_CLIENT_ID:-}
      MIMIR_USERNAME: ${MIMIR_USERNAME:-}
      MIMIR_PASSWORD: ${MIMIR_PASSWORD:-}
      FOLDER_ID: ${FOLDER_ID}
      # Gemini API
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      # Processing rate
      ITEMS_PER_PAGE: ${ITEMS_PER_PAGE:-100}
      GEMINI_DELAY_MS: ${GEMINI_DELAY_MS:-6000}
      BATCH_SIZE: ${BATCH_SIZE:-20}
      # Google SSO gate
      GOOGLE_AUTH_CLIENT_ID: ${GOOGLE_AUTH_CLIENT_ID:-}
      GOOGLE_AUTH_CLIENT_SECRET: ${GOOGLE_AUTH_CLIENT_SECRET:-}
      GOOGLE_AUTH_REDIRECT_URI: ${GOOGLE_AUTH_REDIRECT_URI:-}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-}
      # External scheduler mode (n8n owns the schedule + Discord notification)
      AUTOMATION_SCHEDULER_ENABLED: ${AUTOMATION_SCHEDULER_ENABLED:-true}
      AUTOMATION_API_KEY: ${AUTOMATION_API_KEY:-}
      # Leave DISCORD_WEBHOOK_URL unset here when n8n mode is on — n8n holds
      # the webhook so notifications aren't sent twice.
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
  n8n:
    image: n8nio/n8n:latest
    container_name: mimir-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"               # LAN-only UI — not exposed through Caddy
    environment:
      GENERIC_TIMEZONE: Asia/Bangkok
      TZ: Asia/Bangkok
      N8N_SECURE_COOKIE: "false"  # allow login over plain http on the LAN
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"  # workflows read $env.MIMIR_* (blocked by default)
      # Consumed by the imported workflows via $env.*
      MIMIR_APP_URL: http://mimir-tool:8000
      MIMIR_API_KEY: ${AUTOMATION_API_KEY:-}
      MIMIR_DISCORD_WEBHOOK: ${DISCORD_WEBHOOK_URL_N8N:-}
      MIMIR_PUBLIC_URL: ${APP_BASE_URL:-}
    volumes:
      - n8n_data:/home/node/.n8n  # n8n keeps its own SQLite here
    # n8n reaches the app via the compose network: http://mimir-tool:8000
    depends_on:
      - mimir-tool
  caddy:
    image: caddy:2-alpine
    container_name: mimir-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    configs:
      - source: caddyfile_v3
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mimir-tool
configs:
  caddyfile_v3:
    content: |
      ${PUBLIC_HOSTNAME:-mimir-tool.thestandard.co} {
          encode gzip
          reverse_proxy mimir-tool:8000 {
              header_up X-Forwarded-Proto https
          }
      }
volumes:
  mimir_data:
    driver: local
  postgres_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  n8n_data:
    driver: local
