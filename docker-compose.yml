# Production / Portainer Stack (Web Editor)
# Pulls pre-built image from GHCR — Postgres for persistent storage
services:
  postgres:
    image: postgres:16-alpine
    container_name: mimir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mimir_metadata}
      POSTGRES_USER: ${POSTGRES_USER:-mimir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mimir_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mimir} -d ${POSTGRES_DB:-mimir_metadata}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mimir-tool:
    image: ghcr.io/narasitk77/mimir-metadata-tool:latest
    pull_policy: always
    container_name: mimir-metadata-tool
    expose:
      - "8000"        # internal only — Caddy is the public face
    volumes:
      - mimir_data:/app/data
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mimir}:${POSTGRES_PASSWORD:-mimir_secret}@postgres:5432/${POSTGRES_DB:-mimir_metadata}
      MIMIR_BASE_URL: ${MIMIR_BASE_URL:-https://apac.mjoll.no}
      # Static token (expires ~1h) — leave empty and use Cognito SRP below for auto-refresh
      MIMIR_TOKEN: ${MIMIR_TOKEN:-}
      # Cognito SRP auth (preferred — token auto-refreshes every 55 min)
      MIMIR_COGNITO_USER_POOL_ID: ${MIMIR_COGNITO_USER_POOL_ID:-}
      MIMIR_COGNITO_CLIENT_ID: ${MIMIR_COGNITO_CLIENT_ID:-}
      MIMIR_USERNAME: ${MIMIR_USERNAME:-}
      MIMIR_PASSWORD: ${MIMIR_PASSWORD:-}
      FOLDER_ID: ${FOLDER_ID}
      # Gemini API (only supported AI provider)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      ITEMS_PER_PAGE: ${ITEMS_PER_PAGE:-100}
      GEMINI_DELAY_MS: ${GEMINI_DELAY_MS:-7000}
      BATCH_SIZE: ${BATCH_SIZE:-20}
      # Google SSO gate — restricts access to @thestandard.co accounts
      GOOGLE_AUTH_CLIENT_ID: ${GOOGLE_AUTH_CLIENT_ID:-}
      GOOGLE_AUTH_CLIENT_SECRET: ${GOOGLE_AUTH_CLIENT_SECRET:-}
      GOOGLE_AUTH_REDIRECT_URI: ${GOOGLE_AUTH_REDIRECT_URI:-}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-thestandard.co}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-}
      # Whitelist & admin (comma-separated emails)
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      # Google Sheets OAuth (optional — uses same Client ID as SSO)
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      GOOGLE_SHEET_ID: ${GOOGLE_SHEET_ID:-}
      # Sub-path when running behind reverse proxy (e.g. "/ai-tool"); leave empty otherwise
      APP_ROOT_PATH: ${APP_ROOT_PATH:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Caddy reverse proxy with HTTPS (self-signed via Caddy's local CA) ─────
  caddy:
    image: caddy:2-alpine
    container_name: mimir-caddy
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8765}:443"
    configs:
      - source: caddyfile_v2
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mimir-tool


configs:
  caddyfile_v2:
    content: |
      {
          # On-demand TLS lets Caddy mint a cert for whichever hostname /
          # IP the client connects with — so raw-IP access works alongside
          # 192.168.21.220.nip.io.
          auto_https disable_redirects
          on_demand_tls {
              ask http://mimir-tool:8000/healthz
          }
      }

      :443 {
          tls internal {
              on_demand
          }
          encode gzip
          reverse_proxy mimir-tool:8000 {
              header_up X-Forwarded-Proto https
          }
      }


volumes:
  mimir_data:
    driver: local
  postgres_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
